services:
  - type: web
    name: news-setu
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
